<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="InkMind">
<meta name="theme-color" id="theme-color-meta" content="#0c0b09">
<title>InkMind</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#c9a96e;--gold-dim:#7a6040;
  --bg:#0c0b09;--bg2:#111008;--bg3:#181610;--bg4:#1e1c14;
  --border:#1a1814;--border2:#2a2820;--border3:#353020;
  --text:#ede8de;--text-dim:#504c40;
  --user-text:#6a6560;--user-border:#2a2820;
  --red:#b84040;--sw:290px;
}
.light{
  --gold:#7a5c28;--gold-dim:#9a7840;
  --bg:#f5f1ea;--bg2:#ece8e0;--bg3:#e4e0d8;--bg4:#ddd9d0;
  --border:#ddd9d0;--border2:#ccc8be;--border3:#bbb8b0;
  --text:#1a1712;--text-dim:#888070;
  --user-text:#888070;--user-border:#ccc8be;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Lato',sans-serif;font-weight:300;overflow:hidden;}
#app{display:flex;height:100vh;height:100dvh;position:relative;overflow:hidden;}

/* ════ SPLASH SCREEN ════ */
#splash{
  position:fixed;inset:0;z-index:999;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.6rem;
  transition:opacity .5s ease, visibility .5s ease;
}
#splash.hide{opacity:0;visibility:hidden;}
.splash-name{font-family:'Cormorant Garamond',serif;font-size:3.2rem;font-weight:300;letter-spacing:.35em;color:var(--gold);animation:splashFade .8s ease forwards;}
.splash-sub{font-size:.55rem;color:var(--text-dim);letter-spacing:.35em;text-transform:uppercase;animation:splashFade .8s ease .2s both;}
.splash-line{width:40px;height:1px;background:var(--gold-dim);margin-top:.2rem;animation:splashExpand .8s ease .4s both;}
@keyframes splashFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes splashExpand{from{width:0;opacity:0}to{width:40px;opacity:1}}

/* ════ SIDEBAR ════ */
#sidebar{
  width:var(--sw);min-width:var(--sw);background:var(--bg2);border-right:1px solid var(--border2);
  display:flex;flex-direction:column;height:100%;
  position:absolute;left:0;top:0;bottom:0;z-index:100;
  transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
}
#sidebar.open{transform:translateX(0);}
.sb-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,.55);z-index:99;opacity:0;transition:opacity .28s;}
#sidebar.open~.sb-overlay{display:block;opacity:1;}

/* Sidebar header — just close button, no brand */
.sb-hdr{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1rem .7rem;border-bottom:1px solid var(--border);flex-shrink:0;}
.sb-hdr-left{display:flex;align-items:center;gap:.6rem;}
.sb-profile-mini{width:28px;height:28px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:.8rem;color:var(--gold-dim);cursor:pointer;}
.sb-profile-mini img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.sb-profile-mini-name{font-size:.78rem;color:var(--text-dim);cursor:pointer;}
.sb-profile-mini-name:hover{color:var(--text);}
.sb-x{background:none;border:none;color:var(--text-dim);font-size:1rem;cursor:pointer;}

.sb-home-btn{margin:.5rem .8rem .05rem;padding:.55rem .9rem;background:transparent;border:1px solid var(--border2);border-radius:6px;color:var(--text-dim);font-family:'Lato',sans-serif;font-size:.76rem;cursor:pointer;text-align:left;display:flex;align-items:center;gap:.45rem;transition:all .2s;}
.sb-home-btn:active{border-color:var(--gold-dim);color:var(--gold);}

.sb-sec{padding:.6rem .85rem .2rem;font-size:.54rem;text-transform:uppercase;letter-spacing:.18em;color:var(--text-dim);flex-shrink:0;}
.sb-list{flex:1;overflow-y:auto;padding:.15rem .5rem;}
.sb-list::-webkit-scrollbar{width:2px;}
.sb-list::-webkit-scrollbar-thumb{background:var(--border2);}

.sb-item{display:flex;align-items:center;gap:.5rem;padding:.52rem .58rem;border-radius:6px;cursor:pointer;transition:background .15s;position:relative;}
.sb-item:hover,.sb-item:active{background:var(--bg3);}
.sb-item.cur{background:var(--bg4);}
.sb-av{width:29px;height:29px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:.82rem;color:var(--gold-dim);}
.sb-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.sb-info{flex:1;min-width:0;}
.sb-title{font-size:.79rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-meta{font-size:.56rem;color:var(--text-dim);margin-top:.05rem;}
.sb-acts{display:none;gap:.1rem;flex-shrink:0;}
.sb-item:hover .sb-acts{display:flex;}
.sb-btn{background:none;border:none;color:var(--text-dim);font-size:.76rem;cursor:pointer;padding:.15rem .22rem;border-radius:3px;}
.sb-btn:active{color:var(--gold);}
.sb-btn.del:active{color:var(--red);}
.sb-empty{text-align:center;padding:1.2rem .8rem;font-size:.7rem;color:var(--text-dim);font-style:italic;}

/* Settings at bottom of sidebar — compact */
.sb-divider{border:none;border-top:1px solid var(--border);margin:.3rem .8rem;flex-shrink:0;}
.sb-footer{padding:.6rem .9rem .85rem;flex-shrink:0;display:flex;flex-direction:column;gap:.45rem;}
.sb-footer-row{display:flex;gap:.4rem;}
.sb-mini{flex:1;background:transparent;border:1px solid var(--border2);border-radius:4px;color:var(--text-dim);font-family:'Lato',sans-serif;font-size:.63rem;padding:.44rem .4rem;cursor:pointer;transition:all .2s;text-align:center;}
.sb-mini:active{border-color:var(--gold-dim);color:var(--gold);}
/* Settings page link */
.sb-settings-link{display:flex;align-items:center;justify-content:space-between;padding:.5rem .6rem;border-radius:5px;cursor:pointer;transition:background .15s;}
.sb-settings-link:active{background:var(--bg3);}
.sb-settings-link span{font-size:.76rem;color:var(--text-dim);}
.sb-settings-link .arr{font-size:.7rem;color:var(--text-dim);}

/* ════ MAIN ════ */
#main{flex:1;display:flex;flex-direction:column;height:100%;min-width:0;position:relative;}
.screen{display:none;flex-direction:column;flex:1;height:100%;}
.screen.active{display:flex;}

/* ════ HOME ════ */
#home{overflow-y:auto;align-items:center;padding:0 1.1rem 2rem;}
.home-topbar{width:100%;max-width:520px;display:flex;align-items:center;justify-content:space-between;padding:.9rem 0 0;flex-shrink:0;}
.menu-btn{background:none;border:none;color:var(--text-dim);font-size:1.2rem;cursor:pointer;}
.home-brand{text-align:center;padding:1.1rem 0 1.4rem;flex-shrink:0;}
.home-brand-name{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:300;letter-spacing:.26em;color:var(--gold);line-height:1;}
.home-brand-sub{font-size:.54rem;color:var(--text-dim);letter-spacing:.3em;text-transform:uppercase;margin-top:.38rem;}
.chars-section{width:100%;max-width:520px;}
.chars-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem;}
.chars-label{font-size:.55rem;text-transform:uppercase;letter-spacing:.16em;color:var(--text-dim);}
.new-char-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:5px;color:var(--gold);font-size:.72rem;padding:.33rem .68rem;cursor:pointer;transition:all .2s;}
.new-char-btn:active{background:var(--bg4);}
.chars-list{display:flex;flex-direction:column;gap:.45rem;}
.char-row{display:flex;align-items:center;gap:.82rem;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:.72rem .82rem .72rem .72rem;cursor:pointer;transition:all .18s;position:relative;}
.char-row:active{border-color:var(--gold-dim);background:var(--bg3);}
.char-row-img{width:52px;height:52px;border-radius:6px;background:var(--bg3);border:1px solid var(--border2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--gold-dim);}
.char-row-img img{width:100%;height:100%;object-fit:cover;}
.char-row-info{flex:1;min-width:0;}
.char-row-name{font-family:'Cormorant Garamond',serif;font-size:.96rem;font-weight:400;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.char-row-desc{font-size:.66rem;color:var(--text-dim);line-height:1.4;margin-top:.09rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.char-row-tags{display:flex;flex-wrap:wrap;gap:.18rem;margin-top:.22rem;}
.char-tag{font-size:.56rem;color:var(--text-dim);background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:.09rem .42rem;}
.char-row-more{background:none;border:none;color:var(--text-dim);font-size:1rem;cursor:pointer;padding:.28rem .38rem;flex-shrink:0;border-radius:5px;}
.char-row-more:active{color:var(--gold);}
.dropdown{position:absolute;right:.65rem;top:2.75rem;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;z-index:50;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.4);}
.dropdown button{display:block;width:100%;background:none;border:none;color:var(--text);font-family:'Lato',sans-serif;font-size:.81rem;padding:.62rem 1.05rem;cursor:pointer;text-align:left;white-space:nowrap;transition:background .15s;}
.dropdown button:active{background:var(--bg4);}
.dropdown button.danger{color:var(--red);}
.no-chars{text-align:center;padding:2.5rem 1rem;color:var(--text-dim);}
.no-chars p{font-size:.8rem;margin-bottom:.5rem;}
.no-chars span{font-size:.67rem;opacity:.6;}

/* ════ SHARED PAGE LAYOUT ════ */
.page-topbar{display:flex;align-items:center;gap:.68rem;padding:.82rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0;}
.page-title{font-family:'Cormorant Garamond',serif;font-size:1.08rem;font-weight:300;color:var(--gold);}
.hdr-btn{background:none;border:none;color:var(--text-dim);font-size:.98rem;cursor:pointer;}
.page-body{padding:.95rem 1rem 2rem;display:flex;flex-direction:column;gap:.88rem;max-width:480px;width:100%;margin:0 auto;}

/* ════ PROFILE & SETTINGS PAGES ════ */
#profile-page,#settings-page{overflow-y:auto;}
.photo-row{display:flex;align-items:flex-start;gap:.88rem;}
.photo-circle{width:68px;height:68px;border-radius:50%;background:var(--bg3);border:2px solid var(--border2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1.65rem;color:var(--text-dim);}
.photo-circle img{width:100%;height:100%;object-fit:cover;}
.photo-col{flex:1;min-width:0;display:flex;flex-direction:column;gap:.28rem;}

/* API key on settings page — masked with reveal toggle */
.api-field{display:flex;flex-direction:column;gap:.3rem;}
.api-row{display:flex;align-items:center;gap:.4rem;}
.api-input{flex:1;background:var(--bg2);border:1px solid var(--border2);border-radius:5px;color:var(--text);font-family:'Lato',sans-serif;font-weight:300;font-size:.84rem;padding:.58rem .82rem;outline:none;transition:border-color .2s;width:100%;letter-spacing:.04em;}
.api-input:focus{border-color:var(--gold-dim);}
.api-input[type="password"]{letter-spacing:.14em;}
.api-reveal{background:none;border:1px solid var(--border2);border-radius:4px;color:var(--text-dim);font-size:.72rem;padding:.4rem .55rem;cursor:pointer;flex-shrink:0;white-space:nowrap;}
.api-reveal:active{border-color:var(--gold-dim);color:var(--gold);}
.api-status{font-size:.62rem;color:var(--text-dim);}
.api-status.ok{color:#4a9;}
.api-status.bad{color:var(--red);}

/* ════ CREATOR ════ */
#char-creator{overflow-y:auto;}
.creator-body{padding:.95rem 1rem 2rem;display:flex;flex-direction:column;gap:.88rem;max-width:500px;width:100%;margin:0 auto;}
.field{display:flex;flex-direction:column;gap:.27rem;}
.field label{font-size:.57rem;text-transform:uppercase;letter-spacing:.12em;color:var(--text-dim);}
.fhint{font-size:.59rem;color:var(--text-dim);}
input.fi,textarea.fi{background:var(--bg2);border:1px solid var(--border2);border-radius:5px;color:var(--text);font-family:'Lato',sans-serif;font-weight:300;font-size:.84rem;padding:.57rem .8rem;outline:none;transition:border-color .2s;width:100%;}
input.fi:focus,textarea.fi:focus{border-color:var(--gold-dim);}
textarea.fi{resize:none;line-height:1.6;}
input::placeholder,textarea::placeholder{color:var(--text-dim);}
.traits-wrap{display:flex;flex-wrap:wrap;gap:.3rem;}
.chip{background:var(--bg);border:1px solid var(--border2);border-radius:20px;color:var(--text-dim);font-size:.7rem;padding:.23rem .66rem;cursor:pointer;transition:all .15s;}
.chip.on{background:var(--bg4);border-color:var(--gold-dim);color:var(--gold);}
.save-btn{background:var(--bg3);border:1px solid var(--border3);border-radius:6px;color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:.98rem;font-weight:300;padding:.8rem;cursor:pointer;letter-spacing:.08em;transition:all .2s;margin-top:.1rem;}
.save-btn:active{background:var(--bg4);}

/* ════ CHAT ════ */
#chat{background:var(--bg);}
.chat-topbar{display:flex;align-items:center;justify-content:space-between;padding:.66rem .95rem;border-bottom:1px solid var(--border);flex-shrink:0;}
.chat-left{display:flex;align-items:center;gap:.56rem;min-width:0;}
.sb-open{background:none;border:none;color:var(--text-dim);font-size:1.12rem;cursor:pointer;flex-shrink:0;}
.chat-av{width:28px;height:28px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:.8rem;color:var(--gold-dim);}
.chat-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.chat-info{min-width:0;}
.chat-name{font-family:'Cormorant Garamond',serif;font-size:.95rem;font-weight:300;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chat-sub{font-size:.54rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.12em;}
.chat-right{display:flex;gap:.26rem;flex-shrink:0;}
.icon-btn{background:none;border:1px solid var(--border2);border-radius:4px;color:var(--text-dim);font-size:.65rem;padding:.24rem .46rem;cursor:pointer;}
.icon-btn:active{border-color:var(--gold-dim);color:var(--gold);}

.messages{flex:1;overflow-y:auto;padding:.82rem .88rem .4rem;display:flex;flex-direction:column;gap:.75rem;scroll-behavior:smooth;}
.messages::-webkit-scrollbar{width:2px;}
.messages::-webkit-scrollbar-thumb{background:var(--border2);}
.msg{animation:fadeUp .2s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}

/* User message — with avatar RIGHT */
.msg.user{align-self:flex-end;max-width:84%;display:flex;flex-direction:row;align-items:flex-end;gap:.5rem;}
.user-av{width:26px;height:26px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:.72rem;color:var(--gold-dim);}
.user-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.user-body{display:flex;flex-direction:column;align-items:flex-end;gap:.15rem;}
.msg.user .bubble{border:1px solid var(--user-border);border-radius:14px 14px 3px 14px;color:var(--user-text);font-size:.82rem;padding:.46rem .82rem;line-height:1.6;}
.msg-actions{display:flex;gap:.28rem;opacity:0;transition:opacity .15s;}
.msg.user:hover .msg-actions{opacity:1;}
.msg-act-btn{background:none;border:none;color:var(--text-dim);font-size:.66rem;cursor:pointer;padding:.09rem .18rem;}
.msg-act-btn:active{color:var(--gold);}
.msg.user.editing .bubble{display:none;}
.edit-box{width:220px;background:var(--bg2);border:1px solid var(--gold-dim);border-radius:8px;color:var(--text);font-family:'Lato',sans-serif;font-size:.82rem;padding:.48rem .72rem;outline:none;resize:none;line-height:1.6;}
.edit-btns{display:flex;gap:.28rem;margin-top:.15rem;}
.edit-confirm{background:var(--bg3);border:1px solid var(--gold-dim);border-radius:4px;color:var(--gold);font-family:'Lato',sans-serif;font-size:.7rem;padding:.28rem .65rem;cursor:pointer;}
.edit-cancel{background:none;border:1px solid var(--border2);border-radius:4px;color:var(--text-dim);font-family:'Lato',sans-serif;font-size:.7rem;padding:.28rem .65rem;cursor:pointer;}

/* Bot message */
.msg.bot{display:flex;gap:.58rem;align-items:flex-start;}
.bot-av{width:26px;height:26px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);flex-shrink:0;overflow:hidden;margin-top:2px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:.73rem;color:var(--gold-dim);}
.bot-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.bot-content{flex:1;min-width:0;}
.msg.bot .bubble{border-left:2px solid var(--gold-dim);padding:.32rem .68rem .32rem .85rem;color:var(--text);font-family:'Cormorant Garamond',serif;font-size:1.04rem;line-height:1.85;}
.msg.bot .bubble p{margin-bottom:.4rem;}
.msg.bot .bubble p:last-child{margin-bottom:0;}
.msg.bot .bubble strong{font-weight:400;color:var(--gold);}
.msg.bot .bubble em{font-style:italic;}

/* Streaming cursor */
.stream-cursor{display:inline-block;width:2px;height:1em;background:var(--gold-dim);margin-left:2px;vertical-align:middle;animation:blink .65s steps(1) infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.bot-msg-actions{display:flex;gap:.22rem;margin-top:.2rem;opacity:0;transition:opacity .15s;}
.msg.bot:hover .bot-msg-actions{opacity:1;}
.bot-act-btn{background:none;border:none;color:var(--text-dim);font-size:.66rem;cursor:pointer;padding:.09rem .2rem;border-radius:3px;}
.bot-act-btn:active{color:var(--gold);}

.input-area{flex-shrink:0;border-top:1px solid var(--border);background:var(--bg2);display:flex;align-items:stretch;padding-bottom:env(safe-area-inset-bottom,0px);}
#msg-input{flex:1;background:transparent;border:none;color:var(--text);font-family:'Lato',sans-serif;font-weight:300;font-size:.88rem;line-height:1.5;padding:.78rem .82rem;resize:none;outline:none;min-height:50px;max-height:122px;overflow-y:auto;}
#msg-input::placeholder{color:var(--text-dim);}
#send-btn{background:var(--bg3);border:none;border-left:1px solid var(--border2);color:var(--gold);font-size:.98rem;padding:0 .98rem;cursor:pointer;min-width:46px;display:flex;align-items:center;justify-content:center;}
#send-btn:active{background:var(--bg4);}
#send-btn:disabled{opacity:.28;}

/* ════ MODALS ════ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;z-index:200;padding:1.3rem;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:1.28rem;width:100%;max-width:305px;display:flex;flex-direction:column;gap:.76rem;}
.modal h3{font-family:'Cormorant Garamond',serif;font-size:.98rem;font-weight:300;color:var(--gold);}
.modal-btns{display:flex;gap:.42rem;}
.modal-btns button{flex:1;padding:.56rem;border-radius:5px;font-family:'Lato',sans-serif;font-size:.79rem;cursor:pointer;}
.btn-cancel{background:transparent;border:1px solid var(--border2);color:var(--text-dim);}
.btn-ok{background:var(--bg3);border:1px solid var(--border3);color:var(--gold);}
</style>
</head>
<body>
<div id="splash">
  <div class="splash-name">InkMind</div>
  <div class="splash-line"></div>
  <div class="splash-sub">Immersive AI</div>
</div>
<div id="app">

<!-- ════ SIDEBAR ════ -->
<div id="sidebar">
  <div class="sb-hdr">
    <div class="sb-hdr-left">
      <div class="sb-profile-mini" id="sb-mini-av" onclick="closeSB();showScreen('profile-page');loadProfilePage()">?</div>
      <span class="sb-profile-mini-name" id="sb-mini-name" onclick="closeSB();showScreen('profile-page');loadProfilePage()">Profile</span>
    </div>
    <button class="sb-x" onclick="closeSB()">✕</button>
  </div>

  <button class="sb-home-btn" onclick="closeSB();goHome()">⌂ &nbsp;Home</button>

  <div class="sb-sec">Conversations</div>
  <div class="sb-list" id="sb-sessions"></div>

  <hr class="sb-divider">
  <div class="sb-footer">
    <div class="sb-settings-link" onclick="closeSB();showScreen('settings-page');loadSettingsPage()">
      <span>⚙ Settings</span>

<script>
const MODEL      = "arcee-ai/trinity-large-preview:free";
const MAX_TOKENS = 900;
const SUMM_EVERY = 6;
const OR_URL     = "https://openrouter.ai/api/v1/chat/completions";
const SESS_KEY   = "inkmind_sess_v6";
const CHARS_KEY  = "inkmind_chars_v6";
const KEY_STORE  = "inkmind_key";
const PROF_KEY   = "inkmind_profile";

const TRAITS=["Mysterious","Warm","Cold","Sarcastic","Playful","Serious","Protective","Dangerous","Gentle","Obsessive","Witty","Brooding","Charismatic","Shy","Ruthless","Caring","Cunning","Loyal","Volatile","Stoic"];

let apiKey=localStorage.getItem(KEY_STORE)||"";
// Theme: default light, persist in localStorage
let isDark=(localStorage.getItem("inkmind_theme")==="dark");
document.body.classList.toggle("light",!isDark);
let busy=false,S=null;
let editingCharId=null,creatorFrom="home",renameTargetId=null;
let selectedTraits=new Set(),charPhoto=null,profilePhoto=null,openDropdown=null;
let apiRevealOn=false;

// ── PROFILE ──
function loadProfile(){try{return JSON.parse(localStorage.getItem(PROF_KEY)||"{}");}catch{return{};}}
function getUserName(){const p=loadProfile();return[p.firstname,p.lastname].filter(Boolean).join(" ")||"You";}
function updateSBProfile(){
  const p=loadProfile();
  const name=[p.firstname,p.lastname].filter(Boolean).join(" ");
  document.getElementById("sb-mini-name").textContent=name||"Profile";
  const av=document.getElementById("sb-mini-av");
  if(p.photo)av.innerHTML=`<img src="${p.photo}" alt="profile">`;
  else av.innerHTML=p.firstname?p.firstname.charAt(0).toUpperCase():"?";
}
function getUserAvHTML(){
  const p=loadProfile();
  if(p.photo)return`<img src="${p.photo}" alt="me">`;
  if(p.firstname)return p.firstname.charAt(0).toUpperCase();
  return"·";
}
function loadProfilePage(){
  const p=loadProfile();
  document.getElementById("profile-firstname").value=p.firstname||"";
  document.getElementById("profile-lastname").value=p.lastname||"";
  document.getElementById("profile-photo-url").value=p.photo||"";
  profilePhoto=p.photo||null;
  const c=document.getElementById("profile-circle");
  c.innerHTML=p.photo?`<img src="${p.photo}" alt="profile">`:(p.firstname?p.firstname.charAt(0).toUpperCase():"?");
}
function onProfilePhoto(url){
  if(!url.trim()){profilePhoto=null;document.getElementById("profile-circle").innerHTML="?";return;}
  const img=new Image();img.onload=()=>{profilePhoto=url;document.getElementById("profile-circle").innerHTML=`<img src="${url}" alt="profile">`;};img.onerror=()=>{};img.src=url;
}
function saveProfile(){
  const p={firstname:document.getElementById("profile-firstname").value.trim(),lastname:document.getElementById("profile-lastname").value.trim(),photo:profilePhoto};
  localStorage.setItem(PROF_KEY,JSON.stringify(p));
  updateSBProfile();showScreen("home");renderChars();
}

// ── SETTINGS ──
function loadSettingsPage(){
  document.getElementById("settings-api-key").value=apiKey;
  updateApiStatus();updateThemeBtn();
}
function updateThemeBtn(){
  const btn=document.getElementById("theme-toggle-btn");
  if(btn)btn.textContent=isDark?"◑ Switch to light theme":"◑ Switch to dark theme";
}
function toggleApiReveal(){
  apiRevealOn=!apiRevealOn;
  const inp=document.getElementById("settings-api-key");
  inp.type=apiRevealOn?"text":"password";
  document.querySelector(".api-reveal").textContent=apiRevealOn?"Hide":"Show";
}
function saveApiKey(){
  const val=document.getElementById("settings-api-key").value.trim();
  apiKey=val;
  if(val)localStorage.setItem(KEY_STORE,val);
  else localStorage.removeItem(KEY_STORE);
  updateApiStatus();
}
function updateApiStatus(){
  const line=document.getElementById("api-status-line");
  if(apiKey.length>10){line.textContent="Key saved ✓";line.className="api-status ok";}
  else{line.textContent="No key saved";line.className="api-status bad";}
}

// ── SYSTEM PROMPT ──
function buildSystemPrompt(char){
  const prof=loadProfile(),userName=getUserName();
  const traits=char.traits?.length?char.traits.join(", "):"";
  const tags=char.tags?.length?char.tags.join(", "):"";
  const lang=char.lang||"auto-detect from the user's first message";
  let examples="";
  if(char.examples?.trim()){
    examples=char.examples.replace(/\{\{char\}\}/g,char.name).replace(/\{\{user\}\}/g,userName);
  }
  return`You are ${char.name}. Immersive roleplay / chat experience.

━━━ WHO YOU ARE ━━━
Name: ${char.name}
Description: ${char.desc||""}
Tags: ${tags}
Backstory: ${char.backstory||"not specified"}
Personality: ${traits||"not specified"}
Speaking style: ${char.voice||"natural, in character"}
World/Setting: ${char.world||"flexible"}
Language: ${lang}
${prof.firstname?`The user's name is ${userName}.`:""}

━━━ HOW TO RESPOND ━━━
Adapt fluidly:
- Direct conversation → respond as ${char.name}, first person, naturally.
- Narration/actions (*like this*) → blend GM narration with ${char.name}'s dialogue.
- Scenario/scene → immerse and continue it.
Never break character. No "(OOC)", no "as an AI".

━━━ REGISTER (tu/vous · tú/usted · du/Sie) ━━━
Choose naturally based on relationship and personality.
Formal/cold/professional → "vous/usted/Sie" with a stranger.
Warm/casual/close → "tu/tú/du". Can evolve over time.

━━━ NARRATIVE QUALITY ━━━
Show emotions through behavior — never state them.
Avoid: "comme"/"as if", "soudain/suddenly", atmosphere fillers.
Never invent uninstructed actions for the user.

━━━ LANGUAGE ━━━
${lang}. 100% in that language.
${examples?`\n━━━ EXAMPLE EXCHANGES (style guide only — do NOT repeat) ━━━\n${examples}\n━━━ END EXAMPLES ━━━`:""}`;}

const CORR=`Silent roleplay text corrector. Return ONLY corrected text.
1. Uninvented player action/tone → DELETE sentence.
2. "comme"/"as if"/"como"/"wie" → rewrite.
3. Atmosphere filler → concrete character action.
4. Register (tu/vous) wrong → fix.
5. Repeated noun/adjective in paragraph → synonym.
6. Agreement errors, missing accents → fix.
7. Character silent/waiting at end → add speech or action.
First word only, no comment.`;

// ── INIT ──
// Splash screen — dismiss after 1.6s
setTimeout(()=>{const s=document.getElementById("splash");if(s)s.classList.add("hide");},1600);

// PWA manifest — inject dynamically so single HTML file works as PWA
(function(){
  const icon="data:image/svg+xml,"+encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='90' fill='%230c0b09'/><text x='50%' y='52%' dominant-baseline='middle' text-anchor='middle' font-family='Georgia,serif' font-size='260' fill='%23c9a96e'>I</text><text x='50%' y='80%' dominant-baseline='middle' text-anchor='middle' font-family='Georgia,serif' font-size='72' letter-spacing='18' fill='%237a6040'>NKMIND</text></svg>`);
  const manifest={name:"InkMind",short_name:"InkMind",start_url:".",display:"standalone",background_color:"#0c0b09",theme_color:"#0c0b09",icons:[{src:icon,sizes:"512x512",type:"image/svg+xml"}]};
  const blob=new Blob([JSON.stringify(manifest)],{type:"application/manifest+json"});
  const url=URL.createObjectURL(blob);
  const link=document.createElement("link");link.rel="manifest";link.href=url;
  document.head.appendChild(link);
})();

// Keyboard fix — scroll input into view when keyboard opens on mobile
const ta=document.getElementById("msg-input");
ta.addEventListener("focus",()=>{setTimeout(()=>{ta.scrollIntoView({behavior:"smooth",block:"end"});window.scrollTo(0,0);},300);});
ta.addEventListener("input",()=>{ta.style.height="auto";ta.style.height=Math.min(ta.scrollHeight,122)+"px";});
ta.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}});
document.querySelectorAll(".modal-overlay").forEach(m=>m.addEventListener("click",e=>{if(e.target===e.currentTarget)m.classList.remove("open");}));
document.addEventListener("click",e=>{if(openDropdown&&!e.target.closest(".dropdown")&&!e.target.closest(".char-row-more"))closeAllDropdowns();});
buildTraitsGrid();renderChars();renderSBSessions();updateSBProfile();

function openSB(){renderSBSessions();updateSBProfile();document.getElementById("sidebar").classList.add("open");}
function closeSB(){document.getElementById("sidebar").classList.remove("open");}
function toggleTheme(){isDark=!isDark;document.body.classList.toggle("light",!isDark);localStorage.setItem("inkmind_theme",isDark?"dark":"light");}
function showScreen(id){document.querySelectorAll("#main .screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");}
function goHome(){showScreen("home");renderChars();S=null;}

function buildTraitsGrid(){
  const g=document.getElementById("traits-grid");g.innerHTML="";
  TRAITS.forEach(t=>{const c=document.createElement("button");c.className="chip";c.textContent=t;c.onclick=()=>{if(selectedTraits.has(t)){selectedTraits.delete(t);c.classList.remove("on");}else{selectedTraits.add(t);c.classList.add("on");}};g.appendChild(c);});
}
function setTraits(arr){selectedTraits=new Set(arr||[]);document.querySelectorAll(".chip").forEach(c=>c.classList.toggle("on",selectedTraits.has(c.textContent)));}

function onCharPhoto(url){
  if(!url.trim()){charPhoto=null;document.getElementById("char-photo-circle").innerHTML="✦";return;}
  const img=new Image();img.onload=()=>{charPhoto=url;document.getElementById("char-photo-circle").innerHTML=`<img src="${url}" alt="photo">`;};img.onerror=()=>{};img.src=url;
}

// ── CHARS ──
function loadChars(){try{return JSON.parse(localStorage.getItem(CHARS_KEY)||"[]");}catch{return[];}}
function saveChars(c){localStorage.setItem(CHARS_KEY,JSON.stringify(c));}
function renderChars(){
  closeAllDropdowns();
  const chars=loadChars(),list=document.getElementById("chars-list");
  if(!chars.length){list.innerHTML=`<div class="no-chars"><p>No characters yet.</p><span>Tap "+ New" to create one.</span></div>`;return;}
  list.innerHTML="";
  chars.forEach(char=>{
    const av=char.photo?`<img src="${char.photo}" alt="${char.name}">`:(char.name.charAt(0).toUpperCase());
    const tags=(char.tags||[]).slice(0,3).map(t=>`<span class="char-tag">${esc2(t)}</span>`).join("");
    const row=document.createElement("div");row.className="char-row";row.dataset.charid=char.id;
    row.innerHTML=`<div class="char-row-img">${av}</div><div class="char-row-info"><div class="char-row-name">${esc2(char.name)}</div><div class="char-row-desc">${esc2(char.desc||"")}</div>${tags?`<div class="char-row-tags">${tags}</div>`:""}</div><button class="char-row-more" onclick="toggleDropdown(event,'${char.id}')">···</button><div class="dropdown" id="dd-${char.id}" style="display:none;"><button onclick="closeAllDropdowns();startChatWithChar('${char.id}')">Chat</button><button onclick="closeAllDropdowns();openCreator('${char.id}')">Edit</button><button class="danger" onclick="closeAllDropdowns();deleteChar('${char.id}')">Delete</button></div>`;
    row.querySelector(".char-row-info").addEventListener("click",()=>startChatWithChar(char.id));
    row.querySelector(".char-row-img").addEventListener("click",()=>startChatWithChar(char.id));
    list.appendChild(row);
  });
}
function toggleDropdown(e,id){e.stopPropagation();const dd=document.getElementById("dd-"+id);if(openDropdown&&openDropdown!==id){document.getElementById("dd-"+openDropdown).style.display="none";}if(openDropdown===id){dd.style.display="none";openDropdown=null;}else{dd.style.display="block";openDropdown=id;}}
function closeAllDropdowns(){if(openDropdown){const dd=document.getElementById("dd-"+openDropdown);if(dd)dd.style.display="none";openDropdown=null;}}
function deleteChar(id){if(!confirm("Delete this character?"))return;saveChars(loadChars().filter(c=>c.id!==id));renderChars();}

// ── CREATOR ──
function openCreator(charId){
  editingCharId=charId;creatorFrom=S?.char?.id===charId?"chat":"home";
  selectedTraits=new Set();charPhoto=null;
  ["char-photo-url","char-name","char-desc","char-tags","char-backstory","char-voice","char-firstmsg","char-world","char-lang","char-examples"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});
  document.getElementById("char-photo-circle").innerHTML="✦";
  document.querySelectorAll(".chip").forEach(c=>c.classList.remove("on"));
  if(charId){
    const char=loadChars().find(c=>c.id===charId);
    if(char){
      document.getElementById("creator-title").textContent="Edit Character";
      document.getElementById("char-name").value=char.name||"";document.getElementById("char-desc").value=char.desc||"";document.getElementById("char-tags").value=(char.tags||[]).join(", ");document.getElementById("char-backstory").value=char.backstory||"";document.getElementById("char-voice").value=char.voice||"";document.getElementById("char-firstmsg").value=char.firstMsg||"";document.getElementById("char-world").value=char.world||"";document.getElementById("char-lang").value=char.lang||"";document.getElementById("char-examples").value=char.examples||"";
      if(char.photo){charPhoto=char.photo;document.getElementById("char-photo-url").value=char.photo;document.getElementById("char-photo-circle").innerHTML=`<img src="${char.photo}" alt="photo">`;}
      setTraits(char.traits);
    }
  }else{document.getElementById("creator-title").textContent="New Character";}
  document.getElementById("save-btn").textContent=charId?"Save changes →":"Save character →";
  showScreen("char-creator");
}
function creatorBack(){if(creatorFrom==="chat"&&S)showScreen("chat");else{showScreen("home");renderChars();}}
function saveCharacter(){
  const name=document.getElementById("char-name").value.trim();if(!name){alert("Please give your character a name.");return;}
  const chars=loadChars();
  const char={id:editingCharId||("char_"+Date.now()),name,photo:charPhoto,desc:document.getElementById("char-desc").value.trim(),tags:document.getElementById("char-tags").value.split(",").map(t=>t.trim()).filter(Boolean),backstory:document.getElementById("char-backstory").value.trim(),traits:[...selectedTraits],voice:document.getElementById("char-voice").value.trim(),firstMsg:document.getElementById("char-firstmsg").value.trim(),examples:document.getElementById("char-examples").value.trim(),world:document.getElementById("char-world").value.trim(),lang:document.getElementById("char-lang").value.trim(),updatedAt:Date.now()};
  if(editingCharId){const idx=chars.findIndex(c=>c.id===editingCharId);if(idx>=0)chars[idx]={...chars[idx],...char};else chars.unshift(char);}else chars.unshift(char);
  saveChars(chars);
  if(S?.char?.id===editingCharId){S.char={...S.char,...char};setupChatUI();autosave();}
  creatorBack();
}
function editCurrentChar(){if(S?.char)openCreator(S.char.id);}

// ── START / RESUME ──
function requireKey(){if(!apiKey){showScreen("settings-page");loadSettingsPage();return false;}return true;}
function startChatWithChar(charId){
  if(!requireKey())return;
  const char=loadChars().find(c=>c.id===charId);if(!char)return;
  S={id:"sess_"+Date.now(),title:char.name,charId:char.id,char,summary:"",turn:1,hist:[],messages:[],createdAt:Date.now()};
  setupChatUI();clearMsgs();
  const opener=char.firstMsg?.trim()||`Hello. I'm ${char.name}.`;
  addBot(md(opener),char);S.hist.push(["assistant",opener]);
  autosave();renderSBSessions();showScreen("chat");
}
function resumeSession(sid){
  const sess=loadSessions().find(s=>s.id===sid);if(!sess||!requireKey())return;
  if(sess.charId){const lc=loadChars().find(c=>c.id===sess.charId);if(lc)sess.char=lc;}
  S=sess;setupChatUI();clearMsgs();
  (S.messages||[]).forEach((m,i)=>{if(m.role==="user")addUser(m.rawText||"",false,i);else addBot(m.content,S.char,false,i);});
  showScreen("chat");scrollBottom();closeSB();
}
function setupChatUI(){
  const char=S?.char;
  const av=document.getElementById("chat-av");
  if(char?.photo)av.innerHTML=`<img src="${char.photo}" alt="${char.name}">`;
  else if(char)av.innerHTML=char.name.charAt(0).toUpperCase();
  else av.innerHTML="✦";
  document.getElementById("chat-name").textContent=S?.title||"InkMind";
  document.getElementById("chat-sub").textContent=(char?.tags||[]).slice(0,2).join(" · ")||"";
}

// ── API ──
async function orStream(messages,onChunk){
  const r=await fetch(OR_URL,{
    method:"POST",
    headers:{"Authorization":`Bearer ${apiKey}`,"Content-Type":"application/json","HTTP-Referer":"https://inkmind.app","X-Title":"InkMind"},
    body:JSON.stringify({model:MODEL,max_tokens:MAX_TOKENS,stream:true,messages})
  });
  if(!r.ok){const e=await r.text();throw new Error(`API ${r.status}: ${e.slice(0,100)}`);}
  const reader=r.body.getReader(),dec=new TextDecoder();
  let buf="",full="";
  while(true){
    const{done,value}=await reader.read();if(done)break;
    buf+=dec.decode(value,{stream:true});
    const lines=buf.split("\n");buf=lines.pop();
    for(const line of lines){
      if(!line.startsWith("data:"))continue;
      const d=line.slice(5).trim();if(d==="[DONE]")continue;
      try{const j=JSON.parse(d);const t=j.choices?.[0]?.delta?.content||"";if(t){full+=t;onChunk(full);}}catch{}
    }
  }
  return full;
}

async function orCall(messages,maxTok=400){
  const r=await fetch(OR_URL,{method:"POST",headers:{"Authorization":`Bearer ${apiKey}`,"Content-Type":"application/json","HTTP-Referer":"https://inkmind.app","X-Title":"InkMind"},body:JSON.stringify({model:MODEL,max_tokens:maxTok,messages})});
  if(!r.ok){const e=await r.text();throw new Error(`API ${r.status}: ${e.slice(0,100)}`);}
  return(await r.json()).choices[0].message.content.trim();
}
async function summarize(hist){if(!hist.length)return"";try{return await orCall([{role:"system",content:"Summarize this roleplay/conversation in 3-5 sentences. Keep key plot points, character names, emotional beats."},{role:"user",content:hist.map(([r,m])=>`${r}: ${m}`).join("\n")}],200);}catch{return"";}}
async function correct(txt){
  if(!txt.trim())return txt;const bad=["Page web","WebPage","scalablytyped",".cmo"];
  if(bad.some(b=>txt.includes(b)))return"...";
  try{const r=await orCall([{role:"system",content:CORR},{role:"user",content:txt}],1400);if(bad.some(b=>r.includes(b)))return txt;return r.length>txt.length*0.4?r:txt;}catch{return txt;}
}

// ── SEND (with streaming) ──
async function sendMessage(overrideText=null,fromIndex=null){
  if(busy||!S)return;
  const input=document.getElementById("msg-input");
  const txt=overrideText!==null?overrideText:input.value.trim();
  if(!txt)return;
  if(overrideText===null){input.value="";input.style.height="auto";}
  if(fromIndex!==null){
    const msgs=document.getElementById("messages");
    const all=[...msgs.children];for(let i=fromIndex;i<all.length;i++)all[i].remove();
    S.messages=S.messages.slice(0,fromIndex);
    S.hist=S.messages.map(m=>[m.role==="user"?"user":"assistant",m.rawText||m.content]);
  }
  addUser(txt,true);setBusy(true);
  try{
    S.turn++;
    if(S.turn%SUMM_EVERY===0&&S.hist.length>10){
      setStatus("saving memory...");
      S.summary=await summarize(S.hist.slice(0,-6));S.hist=S.hist.slice(-6);
    }
    const sys=buildSystemPrompt(S.char);
    const msgs=[{role:"system",content:sys}];
    if(S.summary)msgs.push({role:"system",content:`Context so far: ${S.summary}`});
    S.hist.slice(-14).forEach(([r,c])=>msgs.push({role:r==="user"?"user":"assistant",content:c}));
    msgs.push({role:"user",content:txt});
    removeStatus();

    // Create streaming bot bubble
    const el=document.createElement("div");el.className="msg bot";
    const char=S.char;let av="✦";
    if(char?.photo)av=`<img src="${char.photo}" alt="${char.name}">`;
    else if(char)av=char.name.charAt(0).toUpperCase();
    el.innerHTML=`<div class="bot-av">${av}</div><div class="bot-content"><div class="bubble" id="stream-bubble"><p><span id="stream-text"></span><span class="stream-cursor"></span></p></div><div class="bot-msg-actions"><button class="bot-act-btn" onclick="regenerateLast()">↺ Regenerate</button></div></div>`;
    document.getElementById("messages").appendChild(el);scrollBottom();

    const streamTxt=document.getElementById("stream-text");
    let rawFull="";
    rawFull=await orStream(msgs,(full)=>{
      // Render partial markdown live
      streamTxt.innerHTML=partialMd(full);scrollBottom();
    });

    // Remove cursor, finalize
    const cursor=el.querySelector(".stream-cursor");if(cursor)cursor.remove();

    // Final markdown render (no correction pass — avoids visible text change)
    const bubble=document.getElementById("stream-bubble");
    if(bubble){bubble.removeAttribute("id");bubble.innerHTML=md(rawFull);}
    if(S.messages){S.messages.push({role:"assistant",content:md(rawFull)});}
    S.hist.push(["user",txt],["assistant",rawFull]);
    autosave();renderSBSessions();
  }catch(e){
    removeStatus();
    addBot(`<em style="color:var(--red)">Error: ${esc(e.message)}</em>`,null);
  }
  setBusy(false);
}

async function regenerateLast(){
  if(busy||!S||!S.messages||S.messages.length<2)return;
  const msgs=document.getElementById("messages"),all=[...msgs.children];
  for(let i=all.length-1;i>=0;i--){if(all[i].classList.contains("bot")){all[i].remove();break;}}
  for(let i=S.messages.length-1;i>=0;i--){if(S.messages[i].role==="assistant"){S.messages.splice(i,1);break;}}
  for(let i=S.hist.length-1;i>=0;i--){if(S.hist[i][0]==="assistant"){S.hist.splice(i,1);break;}}
  let lastUserText="";
  for(let i=S.messages.length-1;i>=0;i--){if(S.messages[i].role==="user"){lastUserText=S.messages[i].rawText||"";S.messages.splice(i,1);break;}}
  for(let i=S.hist.length-1;i>=0;i--){if(S.hist[i][0]==="user"){S.hist.splice(i,1);break;}}
  const all2=[...document.getElementById("messages").children];
  for(let i=all2.length-1;i>=0;i--){if(all2[i].classList.contains("user")){all2[i].remove();break;}}
  if(lastUserText)await sendMessage(lastUserText,null);
}

// ── UI HELPERS ──
function clearMsgs(){document.getElementById("messages").innerHTML="";}
function getMsgIndex(){return document.getElementById("messages").children.length;}

function addUser(txt,save=true,idx=null){
  const msgIdx=idx!==null?idx:getMsgIndex();
  const el=document.createElement("div");el.className="msg user";el.dataset.idx=msgIdx;
  const userAv=getUserAvHTML();
  el.innerHTML=`<div class="user-body"><div class="msg-actions"><button class="msg-act-btn" onclick="startEditMsg(this)">✎</button><button class="msg-act-btn" onclick="resendMsg(this)">↺</button></div><div class="bubble">${esc(txt)}</div></div><div class="user-av">${userAv}</div>`;
  document.getElementById("messages").appendChild(el);
  if(save&&S){S.messages=S.messages||[];S.messages.push({role:"user",content:esc(txt),rawText:txt});}
  scrollBottom();
}

function addBot(html,char,save=true,idx=null){
  const el=document.createElement("div");el.className="msg bot";
  let av="✦";if(char?.photo)av=`<img src="${char.photo}" alt="${char.name}">`;else if(char)av=char.name.charAt(0).toUpperCase();
  el.innerHTML=`<div class="bot-av">${av}</div><div class="bot-content"><div class="bubble">${html}</div><div class="bot-msg-actions"><button class="bot-act-btn" onclick="regenerateLast()">↺ Regenerate</button></div></div>`;
  document.getElementById("messages").appendChild(el);
  if(save&&S){S.messages=S.messages||[];S.messages.push({role:"assistant",content:html});}
  scrollBottom();
}

function startEditMsg(btn){
  const msgEl=btn.closest(".msg.user");if(msgEl.classList.contains("editing"))return;
  const bubble=msgEl.querySelector(".bubble");const rawTxt=bubble.textContent;
  msgEl.classList.add("editing");
  const box=document.createElement("textarea");box.className="edit-box";box.value=rawTxt;box.rows=2;
  setTimeout(()=>{box.style.height="auto";box.style.height=Math.min(box.scrollHeight,160)+"px";},0);
  box.addEventListener("input",()=>{box.style.height="auto";box.style.height=Math.min(box.scrollHeight,160)+"px";});
  const btns=document.createElement("div");btns.className="edit-btns";
  btns.innerHTML=`<button class="edit-confirm" onclick="confirmEdit(this)">Send ↵</button><button class="edit-cancel" onclick="cancelEdit(this)">Cancel</button>`;
  const body=msgEl.querySelector(".user-body");body.appendChild(box);body.appendChild(btns);box.focus();
}
function confirmEdit(btn){const msgEl=btn.closest(".msg.user");const box=msgEl.querySelector(".edit-box");const newTxt=box.value.trim();if(!newTxt){cancelEdit(btn);return;}const idx=parseInt(msgEl.dataset.idx)||0;cancelEdit(btn);sendMessage(newTxt,idx);}
function cancelEdit(btn){const msgEl=btn.closest(".msg.user");msgEl.classList.remove("editing");const box=msgEl.querySelector(".edit-box");const btns=msgEl.querySelector(".edit-btns");if(box)box.remove();if(btns)btns.remove();}
function resendMsg(btn){const msgEl=btn.closest(".msg.user");const rawTxt=msgEl.querySelector(".bubble").textContent;sendMessage(rawTxt,parseInt(msgEl.dataset.idx)||0);}

function setStatus(txt){removeStatus();if(!txt)return;const el=document.createElement("div");el.className="status-line";el.style.cssText="align-self:center;font-size:.57rem;color:var(--text-dim);letter-spacing:.14em;text-transform:uppercase;animation:pulse 1.4s infinite;padding:.2rem 0;";el.id="st";el.textContent=txt;document.getElementById("messages").appendChild(el);scrollBottom();}
function removeStatus(){const e=document.getElementById("st");if(e)e.remove();}
function scrollBottom(){const m=document.getElementById("messages");m.scrollTop=m.scrollHeight;}
function setBusy(v){busy=v;document.getElementById("send-btn").disabled=v;}

function esc(t){return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");}
function esc2(t){return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function md(t){return"<p>"+t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/\*(.+?)\*/g,"<em>$1</em>").replace(/\n\n+/g,"</p><p>").replace(/\n/g,"<br>")+"</p>";}
// Partial md for streaming — safe on incomplete text
function partialMd(t){return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/\*(.+?)\*/g,"<em>$1</em>").replace(/\n/g,"<br>");}

// ── SESSIONS ──
function loadSessions(){try{return JSON.parse(localStorage.getItem(SESS_KEY)||"[]");}catch{return[];}}
function autosave(){
  if(!S)return;const sessions=loadSessions();const idx=sessions.findIndex(s=>s.id===S.id);
  const toSave={...S,savedAt:Date.now()};if(idx>=0)sessions[idx]=toSave;else sessions.unshift(toSave);
  try{localStorage.setItem(SESS_KEY,JSON.stringify(sessions));}catch{sessions.splice(20);try{localStorage.setItem(SESS_KEY,JSON.stringify(sessions));}catch{}}
}
function renderSBSessions(){
  const sessions=loadSessions(),container=document.getElementById("sb-sessions");
  if(!sessions.length){container.innerHTML=`<p class="sb-empty">No conversations yet</p>`;return;}
  container.innerHTML="";
  sessions.forEach(sess=>{
    const date=new Date(sess.savedAt||sess.createdAt).toLocaleDateString("en",{month:"short",day:"numeric"});
    const mc=sess.messages?Math.floor(sess.messages.length/2):0;
    const char=sess.char;let av="✦";
    if(char?.photo)av=`<img src="${char.photo}" alt="${char.name}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
    else if(char)av=char.name.charAt(0).toUpperCase();
    const isCur=S&&S.id===sess.id;
    const item=document.createElement("div");item.className="sb-item"+(isCur?" cur":"");
    item.innerHTML=`<div class="sb-av">${av}</div><div class="sb-info"><div class="sb-title">${esc2(sess.title||"Chat")}</div><div class="sb-meta">${mc} msg · ${date}</div></div><div class="sb-acts"><button class="sb-btn" onclick="event.stopPropagation();openRename('${sess.id}')">✎</button><button class="sb-btn del" onclick="event.stopPropagation();deleteSession('${sess.id}')">✕</button></div>`;
    item.querySelector(".sb-info").addEventListener("click",()=>resumeSession(sess.id));
    item.querySelector(".sb-av").addEventListener("click",()=>resumeSession(sess.id));
    container.appendChild(item);
  });
}
function deleteSession(sid){if(S?.id===sid){S=null;showScreen("home");renderChars();}localStorage.setItem(SESS_KEY,JSON.stringify(loadSessions().filter(s=>s.id!==sid)));renderSBSessions();}
function clearAllHistory(){if(confirm("Delete all conversations?")){localStorage.removeItem(SESS_KEY);S=null;showScreen("home");renderChars();renderSBSessions();closeSB();}}
function openRename(sid){renameTargetId=sid;const sess=loadSessions().find(s=>s.id===sid);document.getElementById("rename-input").value=sess?.title||"";document.getElementById("rename-modal").classList.add("open");}
function closeModal(id){document.getElementById(id).classList.remove("open");}
function confirmRename(){const name=document.getElementById("rename-input").value.trim();if(!name){closeModal("rename-modal");return;}const sessions=loadSessions();const sess=sessions.find(s=>s.id===renameTargetId);if(sess){sess.title=name;localStorage.setItem(SESS_KEY,JSON.stringify(sessions));}if(S?.id===renameTargetId){S.title=name;document.getElementById("chat-name").textContent=name;}closeModal("rename-modal");renderSBSessions();}
</script>
